kind = "web"
previewPath = "/"
title = "EKO Elektrofrigo - Digital Business Card"
version = "1.0.0"
id = "artifacts/eko-vcard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20378

[services.development]
run = "pnpm --filter @workspace/eko-vcard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eko-vcard", "run", "build" ]
publicDir = "artifacts/eko-vcard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20378"
BASE_PATH = "/"
